name: mind_capsule_app
description: "MindCapsule - 今日の自分を記録して、未来の自分が受け取るアプリ"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.2.2
  http: ^1.2.1
  fl_chart: ^0.68.0
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  intl: ^0.19.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
